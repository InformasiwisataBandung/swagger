    # ----------------------------- Schema struct User
    FormatUser:
      example:
        no_whatsapp: "6281xxx"
        username: "Budi"
        password: "AnakIT"
        role: "admin"
    FormatLoginUser:
      example:
        username: "Budi"
        password: "AnakIT"
    FormatUsernameUser:
      example:
        username: "contoh"
    # ----------------------------- Schema struct Berita
    FormatBerita:
      example:
        id: "contoh"
        kategori: "politic"
        judul: "contoh"
        preview: "ini adalah contoh politic"
        konten:
          paragraf1: "contoh"
          paragraf2: "contoh"
          paragraf3: "contoh"
          paragraf4: "contoh"
          paragraf5: "contoh"
          paragraf6: "contoh"
          paragraf7: "contoh"
          paragraf8: "contoh"
          paragraf9: "contoh"
          paragraf10: "contoh"
        sumber: "contoh.com"
        image: "google.com"
    FormatIDBerita:
      example:
        id: "contoh"
    # ----------------------------- Schema struct Komentar
    FormatKomentar:
      example:
        id: "contoh"
        id_berita: "contohberita"
        komentar: "ini adalah contoh komentar"
    FormatKomentarTanpaBerita:
      example:
        id: "contoh"
        komentar: "ini adalah contoh komentar"
    FormatIDKomentar:
      example:
        id: "contoh"
    # ----------------------------- Schema response
    BerhasilDapetToken:
      example:
        status: true
        message: "berhasil login"
        token: "v4.public.eyJleHAiOiIyMDIzLTExLTMwVDA4OjUwOjE2WiIsImlhdCI6IjIwMjMtMTEtMzBUMDY6NTA6MTZaIiwibmFtZSI6Iklicm9oaW0gTXViYXJvayIsIm5iZiI6IjIwMjMtMTEtMzBUMDY6NTA6MTZaIiwicm9sZSI6ImFkbWluIiwidXNlcm5hbWUiOiJpYnJvaGltIn1438aT4CYjh1m4w1NLuW-ebGKL6mvztDPsh2ZKLy8DKBjKh4KZEI4ZQAboqKTLhGzQ930yKVAEMKSAvMHhqMQH"
    BerhasilGetAllUser:
      example:
        - name: "Contoh1"
          email: "contoh1@gmail.com"
          no_whatsapp: "6281271720763"
          username: "contoh1"
          password: "hashed password"
          role: "admin"
        - name: "Contoh2"
          email: "contoh2@gmail.com"
          no_whatsapp: "6281271720763"
          username: "contoh2"
          password: "hashed password"
          role: "author"
    BerhasilGetOneUser:
      example:
        name: "Contoh"
        email: "contoh@gmail.com"
        no_whatsapp: "6281271720763"
        username: "contoh"
        password: "hashed password"
        role: "admin"
    BerhasilGetAllBerita:
