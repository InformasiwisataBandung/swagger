    SuccessfulDecodeAuthorization:
      example:
        status: true
        data:
          no_whatsapp: ""
          username: "Ibrohim Mubarok"
          password: ""
          role: "admin"
        message: "berhasil decode token"
    FailedDecodeAuthorization:
      example:
